<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1208">
  <link rel="manifest" href="/manifest.json">
  <title>SAE 402</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Style/style.css">
</head>
<body data-continue-url="../messages.html?step=4">
  <canvas id="gameCanvas" aria-label="Flying fabric game"></canvas>
  <div class="score-fixe" id="scoreFixe">Score: 0 / 30</div>

  <div class="center-overlay" id="overlay">
    <div class="message-card" id="messageCard">
      <h1>Henriette's Crossing</h1>
      <p>Help Henriette cross Steinbach Park!</p>
      <p>Tap/click or <strong>Space</strong>: upward impulse.<br>
      <strong>Left/right arrows</strong> or phone tilt: horizontal control.</p>
      <div class="btn-row">
        <button class="primary" id="startBtn">Start game</button>
      </div>
      <p class="hint">Tip: small regular taps give better control.</p>
    </div>
  </div>

  <script src="Script/script.js"></script>
  <script src="/js/pwa.js"></script>
</body>
</html>
