<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1208">
    <link rel="manifest" href="/manifest.json">
    <title>Messages - Henriette's Fabric</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="fond-accueil">
    <a href="jeux.html" class="messages-menu-link">All games</a>
    <main class="messages-page">
        <section class="messages-phone">
            <header class="messages-header">
                <h1>Henriette</h1>
                <p id="messages-etape">Chapitre</p>
            </header>

            <div id="rappel-historique" class="messages-rappel">
                <h2>Historical reminder</h2>
                <p id="rappel-texte"></p>
                <button id="btn-rappel" class="messages-btn">Read messages</button>
            </div>

            <div id="messages-list" class="messages-list hidden"></div>
            <div id="messages-choices" class="messages-choices hidden"></div>
            <div id="messages-map-wrap" class="messages-map-wrap hidden">
                <p id="messages-map-title" class="messages-map-title"></p>
                <div class="messages-map-tools">
                    <button id="btn-user-locate" class="messages-map-btn">Locate me</button>
                    <span id="messages-map-status" class="messages-map-status">Location inactive</span>
                </div>
                <div id="messages-map" class="messages-map"></div>
            </div>
            <button id="btn-lancer-jeu" class="messages-btn hidden" disabled>Start game</button>
        </section>
    </main>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="js/messages.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
