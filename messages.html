<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Le tissu d'Henriette</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="fond-accueil">
    <main class="messages-page">
        <section class="messages-phone">
            <header class="messages-header">
                <h1>Henriette</h1>
                <p id="messages-etape">Chapitre</p>
            </header>

            <div id="rappel-historique" class="messages-rappel">
                <h2>Rappel historique</h2>
                <p id="rappel-texte"></p>
                <button id="btn-rappel" class="messages-btn">Lire les messages</button>
            </div>

            <div id="messages-list" class="messages-list hidden"></div>
            <div id="messages-choices" class="messages-choices hidden"></div>
            <button id="btn-lancer-jeu" class="messages-btn hidden">Lancer le jeu</button>
        </section>
    </main>

    <script src="js/messages.js"></script>
</body>
</html>
